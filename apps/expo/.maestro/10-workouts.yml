appId: ${MAESTRO_APP_ID}
---
- runFlow: _shared-login.yml
- tapOn:
    id: 'tab-workouts'
- tapOn:
    id: 'workouts-new-template'
- tapOn:
    id: 'template-name'
- inputText: 'E2E Strength Template'
- tapOn:
    id: 'template-add-exercise'
- tapOn:
    id: 'workout-exercise-search'
- inputText: 'Squat'
- hideKeyboard
- tapOn:
    id: 'workout-exercise-library-barbell-squat'
- tapOn:
    id: 'workout-exercise-search'
- eraseText
- inputText: 'Bench Press'
- hideKeyboard
- tapOn:
    id: 'workout-exercise-library-barbell-bench-press'
- tapOn:
    id: 'workout-exercise-confirm'
- assertVisible: 'Squat'
- assertVisible: 'Bench Press'
- tapOn:
    id: 'template-save'
- extendedWaitUntil:
    visible: 'E2E Strength Template'
    timeout: 15000
- tapOn:
    text: 'Start Workout'
    index: 0
- tapOn:
    text: 'Start with suggestions'
    optional: true
- extendedWaitUntil:
    visible: 'Active Workout'
    timeout: 15000
- assertVisible: 'Squat'
- tapOn:
    id: 'workout-set-1-weight'
- eraseText
- inputText: '100'
- pressKey: Enter
- tapOn:
    id: 'workout-set-1-reps'
- eraseText
- inputText: '5'
- pressKey: Enter
- tapOn:
    id: 'workout-set-1-complete'
- tapOn:
    id: 'workout-action-complete'
- tapOn:
    text: 'Continue'
    optional: true
- extendedWaitUntil:
    visible: 'Home'
    timeout: 15000
- tapOn:
    id: 'tab-workouts'
- tapOn:
    text: 'Start Workout'
    index: 0
- tapOn:
    text: 'Start with suggestions'
    optional: true
- extendedWaitUntil:
    visible: 'Active Workout'
    timeout: 15000
- assertVisible: '102.5'
- assertVisible: '5'
- tapOn:
    id: 'workout-action-discard'
- tapOn:
    text: 'Discard'
    optional: true
- tapOn:
    id: 'workouts-start-custom'
- tapOn:
    id: 'workouts-custom-name'
- inputText: 'E2E Custom Workout'
- tapOn:
    id: 'workouts-start-empty'
- extendedWaitUntil:
    visible: 'Active Workout'
    timeout: 15000
- tapOn:
    id: 'workout-add-exercise'
- tapOn:
    id: 'workout-exercise-search'
- inputText: 'Squat'
- hideKeyboard
- tapOn:
    id: 'workout-exercise-library-barbell-squat'
- tapOn:
    id: 'workout-exercise-confirm'
- tapOn:
    text: 'Start with suggestions'
    optional: true
- assertVisible: '102.5'
- assertVisible: '5'
