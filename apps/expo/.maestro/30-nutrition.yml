appId: ${MAESTRO_APP_ID}
---
- runScript:
    file: scripts/reset-user.js
    env:
      WORKER_BASE_URL: ${WORKER_BASE_URL}
      E2E_TEST_SECRET: ${E2E_TEST_SECRET}
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
- launchApp:
    clearState: true
- openLink: ${MAESTRO_OPEN_LINK}
- tapOn:
    text: 'Continue'
    optional: true
- tapOn:
    text: 'Close'
    optional: true
- extendedWaitUntil:
    visible: 'Welcome back'
    timeout: 45000
- tapOn:
    id: 'auth-sign-in-email'
- inputText: '${E2E_EMAIL}'
- tapOn:
    id: 'auth-sign-in-password'
- inputText: '${E2E_PASSWORD}'
- tapOn:
    id: 'auth-sign-in-submit'
- extendedWaitUntil:
    visible: 'Home'
    timeout: 15000
- tapOn:
    id: 'onboarding-timezone-confirm'
    optional: true
- tapOn:
    id: 'onboarding-weight-skip'
    optional: true
- tapOn: 'Nutrition'
- tapOn:
    id: 'nutrition-chat-input'
- inputText: 'large Big Mac and large fries'
- tapOn:
    id: 'nutrition-chat-send'
- extendedWaitUntil:
    visible: 'Large Big Mac and Fries'
    timeout: 20000
- assertVisible: '1320'
- assertVisible: '34g'
- tapOn:
    id: 'nutrition-analysis-save'
- extendedWaitUntil:
    visible: 'Saved'
    timeout: 10000
- assertVisible: 'Large Big Mac and Fries'
- tapOn:
    id: 'nutrition-analysis-unsave'
- extendedWaitUntil:
    visible: 'Save'
    timeout: 10000
- tapOn:
    id: 'nutrition-analysis-save'
- extendedWaitUntil:
    visible: 'Saved'
    timeout: 10000
- tapOn:
    text: 'Large Big Mac and Fries'
    index: 1
    optional: true
- tapOn:
    text: 'Delete Meal'
    optional: true
- tapOn:
    text: 'Delete'
    optional: true
