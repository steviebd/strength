appId: ${MAESTRO_APP_ID}
---
- runFlow: _shared-login.yml
- assertVisible: 'Home'
- tapOn:
    id: 'tab-profile'
- scrollUntilVisible:
    element:
      id: 'profile-sign-out'
    direction: DOWN
    timeout: 10000
- tapOn:
    id: 'profile-sign-out'
- extendedWaitUntil:
    visible: 'Sign In'
    timeout: 10000
