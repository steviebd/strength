name: Deploy Worker

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-staging:
    if: github.ref_name != 'main' && github.ref_name != 'master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch staging secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: 78fef9da-6701-477e-940b-2960913a7252
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: staging

      - name: Deploy to staging
        working-directory: apps/worker
        run: |
          bun run generate:wrangler --env staging --d1-mode remote
          wrangler d1 migrations apply strength-db-staging --remote --env staging
          wrangler deploy --env staging

  deploy-production:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch production secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: 78fef9da-6701-477e-940b-2960913a7252
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod

      - name: Deploy to production
        working-directory: apps/worker
        run: |
          bun run generate:wrangler --env prod --d1-mode remote
          wrangler d1 migrations apply strength-db-prod --remote --env prod
          wrangler deploy --env prod
