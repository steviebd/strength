name: Deploy Worker

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-staging:
    if: github.ref_name != 'main' && github.ref_name != 'master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch staging secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: 78fef9da-6701-477e-940b-2960913a7252
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: staging

      - name: Build Expo web assets
        run: pnpm --filter @strength/expo build:web

      - name: Deploy to staging
        working-directory: apps/worker
        run: |
          pnpm run generate:wrangler --env staging --d1-mode remote
          pnpm exec wrangler deploy --env staging

  deploy-production:
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch production secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: 78fef9da-6701-477e-940b-2960913a7252
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: prod

      - name: Build Expo web assets
        run: pnpm --filter @strength/expo build:web

      - name: Deploy to production
        working-directory: apps/worker
        run: |
          pnpm run generate:wrangler --env prod --d1-mode remote
          pnpm exec wrangler deploy --env prod
